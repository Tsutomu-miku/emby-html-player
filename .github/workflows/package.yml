name: Package Installers

on:
  workflow_dispatch:
    inputs:
      native_runtime_url:
        description: Zip URL containing vendor/mpv/<platform>/<arch> reviewed runtimes
        required: false
        type: string
      create_release:
        description: Attach artifacts to a GitHub release
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      NATIVE_RUNTIME_URL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.native_runtime_url || secrets.NATIVE_RUNTIME_URL }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            platform: darwin
            package_script: package:mac
          - name: Windows x64
            os: windows-latest
            platform: win32
            package_script: package:win

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: msys2/setup-msys2@v2
        if: ${{ matrix.platform == 'win32' }}
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-mpv

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download reviewed native runtimes
        if: ${{ env.NATIVE_RUNTIME_URL != '' }}
        shell: bash
        run: |
          curl -L "$NATIVE_RUNTIME_URL" -o native-runtime.zip
          python - <<'PY'
          import zipfile
          with zipfile.ZipFile("native-runtime.zip") as z:
              z.extractall(".")
          PY

      - name: Bundle Windows libmpv fallback
        if: ${{ matrix.platform == 'win32' }}
        shell: msys2 {0}
        run: |
          set -euo pipefail
          workspace="$(cygpath -u "$GITHUB_WORKSPACE")"
          target="$workspace/resources/native/win32/x64"
          if [ -d "$workspace/vendor/mpv/win32/x64" ]; then
            echo "Reviewed Windows runtime exists; stage:native will use it."
            exit 0
          fi
          mkdir -p "$target/include/mpv"
          cp /mingw64/include/mpv/client.h "$target/include/mpv/client.h"
          cp /mingw64/include/mpv/render.h "$target/include/mpv/render.h"
          cp /mingw64/include/mpv/render_gl.h "$target/include/mpv/render_gl.h"
          declare -A copied=()
          copy_dll() {
            local source="$1"
            local name
            name="$(basename "$source")"
            if [ -n "${copied[$name]:-}" ]; then
              return
            fi
            copied[$name]=1
            cp -f "$source" "$target/$name"
            while IFS= read -r dep; do
              copy_dll "$dep"
            done < <(ldd "$source" | awk '{ for (i = 1; i <= NF; i++) if ($i ~ /^\/mingw64\/bin\/.*\.dll$/) print $i }')
          }
          copy_dll /mingw64/bin/libmpv-2.dll
          find "$target" -maxdepth 1 -iname '*.dll' -print | sort

      - name: Install macOS libmpv build headers
        if: ${{ matrix.platform == 'darwin' }}
        run: |
          brew update
          brew install mpv

      - name: Bundle macOS libmpv fallback
        if: ${{ matrix.platform == 'darwin' }}
        shell: bash
        run: |
          arch="$(node -p "process.arch")"
          if [ ! -f "vendor/mpv/darwin/${arch}/libmpv.2.dylib" ]; then
            pnpm bundle:native:mac -- --source="$(brew --prefix mpv)/lib/libmpv.2.dylib" --arch="${arch}"
          fi

      - name: Stage reviewed native runtime
        shell: bash
        run: |
          arch="$(node -p "process.arch")"
          if [ -d "vendor/mpv/${{ matrix.platform }}/${arch}" ]; then
            pnpm stage:native -- --platform=${{ matrix.platform }} --arch="${arch}"
          else
            echo "No reviewed runtime found at vendor/mpv/${{ matrix.platform }}/${arch}; package step will verify required native files."
          fi

      - name: Check native runtime availability
        id: native
        shell: bash
        run: |
          arch="$(node -p "process.arch")"
          native_dir="resources/native/${{ matrix.platform }}/${arch}"
          can_package=false
          if [ "${{ matrix.platform }}" = "darwin" ] && [ -f "$native_dir/libmpv.2.dylib" ]; then
            can_package=true
          fi
          if [ "${{ matrix.platform }}" = "win32" ]; then
            if { [ -f "$native_dir/libmpv.dll" ] || [ -f "$native_dir/mpv-2.dll" ] || [ -f "$native_dir/libmpv-2.dll" ]; } \
              && [ -f "$native_dir/include/mpv/client.h" ] \
              && [ -f "$native_dir/include/mpv/render.h" ] \
              && [ -f "$native_dir/include/mpv/render_gl.h" ]; then
              can_package=true
            fi
          fi
          echo "can_package=$can_package" >> "$GITHUB_OUTPUT"
          if [ "$can_package" != "true" ]; then
            echo "::notice::Skipping ${{ matrix.name }} installer because reviewed libmpv runtime is missing. Configure NATIVE_RUNTIME_URL or vendor/mpv/${{ matrix.platform }}/${arch} to build it."
          fi

      - name: Verify TypeScript and lint
        run: |
          pnpm typecheck
          pnpm lint

      - name: Build installer
        if: ${{ steps.native.outputs.can_package == 'true' }}
        run: pnpm ${{ matrix.package_script }}

      - name: Smoke test Windows libmpv loader
        if: ${{ matrix.platform == 'win32' && steps.native.outputs.can_package == 'true' }}
        shell: pwsh
        run: |
          $nativeDir = Join-Path $PWD 'resources/native/win32/x64'
          $dll = @('libmpv.dll', 'mpv-2.dll', 'libmpv-2.dll') |
            ForEach-Object { Join-Path $nativeDir $_ } |
            Where-Object { Test-Path $_ } |
            Select-Object -First 1
          if (-not $dll) {
            throw "No bundled libmpv DLL found in $nativeDir"
          }
          Add-Type -TypeDefinition @'
          using System;
          using System.Runtime.InteropServices;
          public static class NativeLoader {
            [DllImport("kernel32", SetLastError = true, CharSet = CharSet.Unicode)]
            public static extern IntPtr LoadLibraryEx(string lpFileName, IntPtr hFile, int dwFlags);
            [DllImport("kernel32", SetLastError = true)]
            public static extern bool FreeLibrary(IntPtr hModule);
          }
          '@
          $LOAD_LIBRARY_SEARCH_DLL_LOAD_DIR = 0x00000100
          $LOAD_LIBRARY_SEARCH_DEFAULT_DIRS = 0x00001000
          $handle = [NativeLoader]::LoadLibraryEx(
            $dll,
            [IntPtr]::Zero,
            $LOAD_LIBRARY_SEARCH_DLL_LOAD_DIR -bor $LOAD_LIBRARY_SEARCH_DEFAULT_DIRS)
          if ($handle -eq [IntPtr]::Zero) {
            $code = [Runtime.InteropServices.Marshal]::GetLastWin32Error()
            throw "LoadLibraryEx failed for $dll with Win32 error $code"
          }
          [NativeLoader]::FreeLibrary($handle) | Out-Null
          Write-Host "Loaded $dll"

      - name: Upload installer artifacts
        if: ${{ steps.native.outputs.can_package == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: emby-desktop-player-${{ matrix.platform }}-${{ runner.arch }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb

      - name: Publish GitHub release
        if: ${{ steps.native.outputs.can_package == 'true' && (startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')) }}
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
